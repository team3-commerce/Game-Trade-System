name: CI

on:
  pull_request:
    branches: ["main"]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: Build & Test
        run: |
          chmod +x gradlew
          ./gradlew build --no-daemon
        env:
          DB_URL: jdbc:h2:mem:testdb;MODE=MySQL
          DB_USERNAME: sa
          DB_PASSWORD:
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET: test-secret-key-for-ci-build-minimum-32-characters
          GOOGLE_CLIENT_ID: test
          GOOGLE_CLIENT_SECRET: test
          KAKAO_CLIENT_ID: test
          KAKAO_CLIENT_SECRET: test
          GITHUB_CLIENT_ID: test
          GITHUB_CLIENT_SECRET: test
