name: SANITY-CHECK

# build가 되고 포매팅이 적용 되었는지 확인합니다

on:
  pull_request:
    branches: ["dev"]
  workflow_dispatch: # 수동으로 적용 가능

concurrency:
  group: sanity-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Check Build And Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "17"
          cache: "gradle"

      - name: check build and formatting
        run: |
          chmod +x gradlew
          ./gradlew spotlessCheck build --no-daemon -x test
