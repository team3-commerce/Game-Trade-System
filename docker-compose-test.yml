version: "3.8"

services:
  redis:
    image: redis
    container_name: redis
    ports:
      - "6380:6379"

  db:
    image: mysql:8.4
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: 1234
      MYSQL_DATABASE: tradedb
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
    name: ${GAME_TRADE_SYSTEM_DB_VOLUME_NAME:-db-data}
    external: true
