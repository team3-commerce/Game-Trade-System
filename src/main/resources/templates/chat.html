<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>채팅 테스트</title>
    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1/dist/sockjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/stompjs@2.3.3/lib/stomp.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap');

        :root {
            --bg: #0a0e27;
            --surface: #151a33;
            --surface2: #1e2542;
            --border: #2a3150;
            --text: #e8eaed;
            --text-muted: #8b92b0;
            --blue: #4c9aff;
            --green: #36b37e;
            --red: #ff5630;
            --yellow: #ffab00;
            --purple: #6554c0;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'IBM Plex Sans KR', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ─── LOGIN OVERLAY ─── */
        .login-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 39, 0.95);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .login-overlay.hidden { display: none; }

        .login-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px;
            width: 360px;
        }
        .login-card h2 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 8px;
        }
        .login-card p {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 28px;
        }
        .login-field {
            margin-bottom: 16px;
        }
        .login-field label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }
        .login-field input {
            width: 100%;
            padding: 12px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'IBM Plex Sans KR', sans-serif;
        }
        .login-field input:focus {
            outline: none;
            border-color: var(--blue);
        }
        .login-btn {
            width: 100%;
            padding: 13px;
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: background 0.2s;
        }
        .login-btn:hover { background: #3d8ee6; }
        .login-error {
            color: var(--red);
            font-size: 13px;
            margin-top: 12px;
            text-align: center;
            min-height: 20px;
        }

        /* ─── LAYOUT ─── */
        .container {
            display: grid;
            grid-template-columns: 320px 1fr;
            height: 100vh;
        }

        /* ─── SIDEBAR ─── */
        .sidebar {
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .sidebar-header {
            padding: 24px;
            border-bottom: 1px solid var(--border);
        }
        .sidebar-header h1 { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 8px; }

        .current-user {
            padding: 14px 24px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .current-user-info {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-avatar {
            width: 34px;
            height: 34px;
            background: var(--blue);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
        }
        .user-name { font-size: 14px; font-weight: 600; }
        .user-id { font-size: 11px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }
        .logout-btn {
            padding: 6px 12px;
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 6px;
            color: var(--text-muted);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .logout-btn:hover { border-color: var(--red); color: var(--red); }

        .status-indicator {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-muted);
            padding: 10px 24px;
            border-bottom: 1px solid var(--border);
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--red);
            animation: pulse 2s infinite;
        }
        .status-dot.connected { background: var(--green); }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .room-list { flex: 1; overflow-y: auto; padding: 12px; }
        .room-list h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); padding: 12px; font-weight: 600; }
        .room-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .room-item:hover { border-color: var(--blue); background: rgba(76, 154, 255, 0.05); }
        .room-item.active { border-color: var(--blue); background: rgba(76, 154, 255, 0.1); }
        .room-item h4 { font-size: 15px; font-weight: 600; }
        .room-item .room-id { font-size: 12px; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; }

        .create-room { padding: 16px 24px; border-top: 1px solid var(--border); }
        .create-room input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            margin-bottom: 8px;
            font-family: 'IBM Plex Sans KR', sans-serif;
        }
        .create-room input:focus { outline: none; border-color: var(--blue); }
        .create-room button {
            width: 100%;
            padding: 10px;
            background: var(--blue);
            border: none;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .create-room button:hover { background: #3d8ee6; }

        /* ─── 초대 모달 ─── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(10, 14, 39, 0.85);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 200;
        }
        .modal-overlay.hidden { display: none; }
        .modal-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 32px;
            width: 400px;
            max-height: 80vh;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }
        .modal-card h3 { font-size: 18px; font-weight: 700; }
        .modal-card input {
            width: 100%;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 14px;
            font-family: 'IBM Plex Sans KR', sans-serif;
        }
        .modal-card input:focus { outline: none; border-color: var(--blue); }
        .member-list {
            overflow-y: auto;
            max-height: 250px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .member-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .member-item:hover { border-color: var(--blue); }
        .member-item.selected { border-color: var(--blue); background: rgba(76,154,255,0.1); }
        .member-item input[type="checkbox"] { accent-color: var(--blue); width: 16px; height: 16px; }
        .member-item-info { display: flex; flex-direction: column; }
        .member-item-nickname { font-size: 14px; font-weight: 600; }
        .member-item-email { font-size: 12px; color: var(--text-muted); }
        .modal-actions { display: flex; gap: 8px; }
        .modal-actions button {
            flex: 1;
            padding: 11px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-cancel { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border) !important; }
        .btn-cancel:hover { border-color: var(--text-muted) !important; }
        .btn-confirm { background: var(--blue); color: #fff; }
        .btn-confirm:hover { background: #3d8ee6; }

        /* ─── CHAT MESSAGES ─── */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px 28px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* 상대방: 왼쪽 */
        .message { display: flex; flex-direction: column; gap: 4px; max-width: 65%; align-self: flex-start; align-items: flex-start; }
        /* 나: 오른쪽 */
        .message.me { align-self: flex-end; align-items: flex-end; }

        .message-sender { font-size: 12px; font-weight: 600; color: var(--text-muted); padding-left: 4px; }

        /* 상대방 말풍선 */
        .message-bubble {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 18px 18px 18px 4px;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            color: var(--text);
        }
        /* 내 말풍선 */
        .message.me .message-bubble {
            background: var(--blue);
            border-color: var(--blue);
            border-radius: 18px 18px 4px 18px;
            color: #fff;
        }
        .message-time { font-size: 11px; color: var(--text-muted); padding: 0 4px; }
        .chat-area { display: flex; flex-direction: column; background: var(--bg); }
        .chat-header { padding: 20px 28px; border-bottom: 1px solid var(--border); background: var(--surface); }
        .chat-header h2 { font-size: 18px; font-weight: 600; margin-bottom: 4px; }
        .chat-header p { font-size: 13px; color: var(--text-muted); }



        .chat-input-wrapper { padding: 20px 28px; border-top: 1px solid var(--border); background: var(--surface); }
        .typing-indicator { font-size: 13px; color: var(--green); padding: 0 0 8px 4px; min-height: 24px; font-style: italic; }
        .typing-indicator .dots::after { content: '...'; animation: dots 1.4s steps(4, end) infinite; }
        @keyframes dots { 0%, 20% { content: '.'; } 40% { content: '..'; } 60%, 100% { content: '...'; } }
        .chat-input-form { display: flex; gap: 12px; }
        .chat-input-form input {
            flex: 1;
            padding: 14px 18px;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            font-size: 14px;
            font-family: 'IBM Plex Sans KR', sans-serif;
        }
        .chat-input-form input:focus { outline: none; border-color: var(--blue); }
        .chat-input-form button {
            padding: 14px 24px;
            background: var(--blue);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .chat-input-form button:hover { background: #3d8ee6; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            gap: 12px;
        }
        .empty-state h3 { font-size: 18px; font-weight: 600; color: var(--text); }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
    </style>
</head>
<body>

<!-- ════════ 로그인 오버레이 ════════ -->
<div class="login-overlay" id="loginOverlay">
    <div class="login-card">
        <h2>🔐 로그인</h2>
        <p>채팅을 시작하려면 로그인하세요</p>
        <div class="login-field">
            <label>이메일</label>
            <input type="email" id="loginEmail" placeholder="user@example.com" />
        </div>
        <div class="login-field">
            <label>비밀번호</label>
            <input type="password" id="loginPassword" placeholder="비밀번호 입력" />
        </div>
        <button class="login-btn" onclick="login()">로그인</button>
        <div class="login-error" id="loginError"></div>
    </div>
</div>

<!-- ════════ 채팅방 생성 모달 ════════ -->
<div class="modal-overlay hidden" id="createRoomModal">
    <div class="modal-card">
        <h3>새 채팅방 만들기</h3>
        <!-- 채팅방 이름은 서버에서 자동 생성: "{상대방 닉네임}과의 채팅" -->
        <div style="font-size:12px; text-transform:uppercase; letter-spacing:1px; color:var(--text-muted); font-weight:600;">
            초대할 사람 선택
        </div>
        <div class="member-list" id="inviteMemberList">
            <div style="color:var(--text-muted); font-size:13px;">불러오는 중...</div>
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeCreateModal()">취소</button>
            <button class="btn-confirm" onclick="createRoom()">채팅방 생성</button>
        </div>
    </div>
</div>

<!-- ════════ 메인 ════════ -->
<div class="container">
    <!-- SIDEBAR -->
    <div class="sidebar">
        <div class="sidebar-header">
            <h1>채팅 테스트</h1>
        </div>

        <!-- 현재 로그인 사용자 표시 -->
        <div class="current-user">
            <div class="current-user-info">
                <div class="user-avatar" id="userAvatar">?</div>
                <div>
                    <div class="user-name" id="currentNickname">-</div>
                    <div class="user-id" id="currentMemberId">-</div>
                </div>
            </div>
            <button class="logout-btn" onclick="logout()">로그아웃</button>
        </div>

        <div class="status-indicator">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">연결 대기중...</span>
        </div>

        <div class="room-list">
            <h3>채팅방</h3>
            <div id="roomList"></div>
        </div>

        <div class="create-room">
            <button onclick="openCreateModal()" style="margin-top:0;">+ 새 채팅방 만들기</button>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-area">
        <div class="chat-header">
            <h2 id="chatTitle">채팅방을 선택해주세요</h2>
            <p id="chatSubtitle">왼쪽에서 채팅방을 선택하거나 새로 만들어보세요</p>
        </div>

        <div class="chat-messages" id="chatMessages">
            <div class="empty-state">
                <h3>📭 메시지가 없습니다</h3>
                <p>채팅방을 선택하고 메시지를 보내보세요!</p>
            </div>
        </div>

        <div class="chat-input-wrapper">
            <div class="typing-indicator" id="typingIndicator"></div>
            <form class="chat-input-form" id="chatForm" onsubmit="sendMessage(event)">
                <input type="text" id="messageInput" placeholder="메시지를 입력하세요..." disabled oninput="handleTyping()" />
                <button type="submit" disabled>전송</button>
            </form>
        </div>
    </div>
</div>

<script>
    const API_BASE = 'http://localhost:8080';
    const WS_URL  = 'http://localhost:8080/ws';

    let stompClient = null;
    let currentUserId   = null;   // Long (숫자)
    let currentNickname = null;   // String
    let currentRoomId   = null;
    let jwtToken        = null;
    let rooms           = [];
    let currentSubscription = null;
    let typingTimeout   = null;
    let typingUsers     = new Set();

    // ─────────────────────────────────────────────────────────
    // 로그인
    // ─────────────────────────────────────────────────────────
    async function login() {
        const email    = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;
        const errorEl  = document.getElementById('loginError');
        errorEl.textContent = '';

        if (!email || !password) {
            errorEl.textContent = '이메일과 비밀번호를 입력해주세요.';
            return;
        }

        try {
            // 1단계: 로그인 → accessToken 획득
            const loginResponse = await fetch(`${API_BASE}/api/v1/auth/login`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });

            if (!loginResponse.ok) {
                errorEl.textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
                return;
            }

            const loginData = await loginResponse.json();
            // TokenAuthResponse: { accessToken, refreshToken, grantType }
            // ApiResponse 래핑 시: { data: { accessToken, ... } }
            const tokenPayload = loginData.data ?? loginData;
            jwtToken = tokenPayload.accessToken ?? tokenPayload.token;

            if (!jwtToken) {
                errorEl.textContent = '토큰을 받지 못했습니다.';
                return;
            }

            // 2단계: GET /api/v1/me → nickname, email 조회
            // GetMyInfoResponse: { email, nickname, role }
            const meResponse = await fetch(`${API_BASE}/api/v1/me`, {
                headers: { 'Authorization': `Bearer ${jwtToken}` }
            });

            if (!meResponse.ok) {
                errorEl.textContent = '사용자 정보를 가져오지 못했습니다.';
                return;
            }

            const meData = await meResponse.json();
            const me = meData.data ?? meData; // ApiResponse 래핑 여부 대응

            currentNickname = me.nickname;
            currentUserId   = me.email; // memberId가 응답에 없으므로 email로 대체

            console.log('✅ 로그인 성공 - nickname:', currentNickname, 'email:', currentUserId);

            // 로그인 오버레이 숨기기
            document.getElementById('loginOverlay').classList.add('hidden');

            // 사용자 정보 표시
            document.getElementById('userAvatar').textContent =
                currentNickname ? currentNickname.charAt(0).toUpperCase() : '?';
            document.getElementById('currentNickname').textContent = currentNickname ?? '-';
            document.getElementById('currentMemberId').textContent = currentUserId ?? '-';

            // WebSocket 연결 + 채팅방 목록 로드
            connectWebSocket();
            await loadRooms();

        } catch (error) {
            console.error('❌ 로그인 실패:', error);
            errorEl.textContent = '로그인 중 오류가 발생했습니다.';
        }
    }

    // Enter 키로 로그인
    document.getElementById('loginPassword').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') login();
    });

    function logout() {
        if (stompClient) stompClient.disconnect();
        jwtToken = currentUserId = currentNickname = null;
        currentRoomId = null;
        document.getElementById('loginOverlay').classList.remove('hidden');
        document.getElementById('loginEmail').value = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginError').textContent = '';
        updateStatus(false);
        clearMessages();
    }

    // ─────────────────────────────────────────────────────────
    // WebSocket 연결
    // ─────────────────────────────────────────────────────────
    function connectWebSocket() {
        console.log('🔌 WebSocket 연결 시도...');

        const socket = new SockJS(WS_URL);
        stompClient = Stomp.over(socket);
        stompClient.debug = (str) => console.log('🔍 STOMP:', str);

        // [수정] Authorization 헤더에 "Bearer " 접두사 포함하여 전송
        // StompAuthInterceptor에서 startsWith("Bearer ") 검사를 하므로 반드시 포함해야 함
        stompClient.connect(
            { Authorization: `Bearer ${jwtToken}` },
            function(frame) {
                console.log('✅ WebSocket 연결 완료:', frame);
                updateStatus(true);
            },
            function(error) {
                console.error('❌ WebSocket 연결 실패:', error);
                updateStatus(false);
                setTimeout(connectWebSocket, 5000);
            }
        );
    }

    function updateStatus(connected) {
        const dot  = document.getElementById('statusDot');
        const text = document.getElementById('statusText');
        if (connected) {
            dot.classList.add('connected');
            // [수정] Alice/Bob 대신 실제 nickname 표시
            text.textContent = `${currentNickname} 연결됨`;
        } else {
            dot.classList.remove('connected');
            text.textContent = '연결 끊김';
        }
    }

    // ─────────────────────────────────────────────────────────
    // 채팅방
    // ─────────────────────────────────────────────────────────
    async function loadRooms() {
        try {
            const response = await fetch(`${API_BASE}/api/chat/rooms`, {
                headers: { Authorization: `Bearer ${jwtToken}` }
            });
            if (!response.ok) return;
            rooms = await response.json();
            renderRooms();
        } catch (e) { console.error('채팅방 목록 실패:', e); }
    }

    // ─── 채팅방 생성 모달 ───────────────────────────────────

    function openCreateModal() {
        document.getElementById('createRoomModal').classList.remove('hidden');
        loadInvitableMembers();
    }

    function closeCreateModal() {
        document.getElementById('createRoomModal').classList.add('hidden');
    }

    async function loadInvitableMembers() {
        const list = document.getElementById('inviteMemberList');
        list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">불러오는 중...</div>';
        try {
            const res = await fetch(`${API_BASE}/api/chat/rooms/invitable-members`, {
                headers: { Authorization: `Bearer ${jwtToken}` }
            });
            if (!res.ok) { list.innerHTML = '<div style="color:var(--red);font-size:13px;">불러오기 실패</div>'; return; }
            const members = await res.json();
            if (members.length === 0) {
                list.innerHTML = '<div style="color:var(--text-muted);font-size:13px;">초대 가능한 회원이 없습니다</div>';
                return;
            }
            list.innerHTML = members.map(m => `
                <div class="member-item" onclick="toggleMember(this)" data-email="${escapeHtml(m.email)}">
                    <input type="checkbox" onclick="event.stopPropagation()" />
                    <div class="member-item-info">
                        <div class="member-item-nickname">${escapeHtml(m.nickname)}</div>
                        <div class="member-item-email">${escapeHtml(m.email)}</div>
                    </div>
                </div>
            `).join('');
        } catch (e) { list.innerHTML = '<div style="color:var(--red);font-size:13px;">오류 발생</div>'; }
    }

    // 라디오 스타일 — 클릭하면 기존 선택 해제 후 해당 항목만 선택 (1명만 가능)
    function toggleMember(el) {
        const wasSelected = el.classList.contains('selected');
        // 모든 선택 먼저 해제
        document.querySelectorAll('.member-item.selected').forEach(item => {
            item.classList.remove('selected');
            item.querySelector('input[type="checkbox"]').checked = false;
        });
        // 이미 선택된 항목을 다시 클릭하면 해제 상태로 유지, 아니면 선택
        if (!wasSelected) {
            el.classList.add('selected');
            el.querySelector('input[type="checkbox"]').checked = true;
        }
    }

    async function createRoom() {
        const inviteeEmails = [...document.querySelectorAll('.member-item.selected')]
            .map(el => el.dataset.email);

        if (inviteeEmails.length !== 1) {
            alert('대화 상대를 1명 선택해주세요.');
            return;
        }

        try {
            // name 필드 제거 — 서버에서 "{상대방 닉네임}과의 채팅"으로 자동 생성
            const response = await fetch(`${API_BASE}/api/chat/rooms`, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${jwtToken}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ inviteeEmails })
            });

            if (!response.ok) {
                const errBody = await response.text();
                try {
                    const errJson = JSON.parse(errBody);
                    alert(errJson.message ?? errJson.error ?? '채팅방 생성 실패');
                } catch {
                    alert(errBody || '채팅방 생성 실패');
                }
                return;
            }
            closeCreateModal();
            await loadRooms();
        } catch (e) { console.error('채팅방 생성 실패:', e); }
    }

    function renderRooms() {
        const container = document.getElementById('roomList');
        container.innerHTML = rooms.map(room => `
            <div class="room-item ${currentRoomId === room.id ? 'active' : ''}"
                 onclick="selectRoom(${room.id}, '${escapeHtml(room.displayName ?? room.name)}')">
                <div>
                    <h4>${escapeHtml(room.displayName ?? room.name)}</h4>
                    <div class="room-id">ID: ${room.id}</div>
                </div>
            </div>
        `).join('');
    }

    async function selectRoom(roomId, roomName) {
        if (currentSubscription) { currentSubscription.unsubscribe(); currentSubscription = null; }

        currentRoomId = roomId;
        typingUsers.clear();
        updateTypingIndicator();

        document.getElementById('chatTitle').textContent = roomName;
        document.getElementById('chatSubtitle').textContent = `Room ID: ${roomId}`;
        document.getElementById('messageInput').disabled = false;
        document.querySelector('.chat-input-form button').disabled = false;

        renderRooms();
        clearMessages();
        await loadPastMessages(roomId);

        if (stompClient && stompClient.connected) {
            currentSubscription = stompClient.subscribe(`/sub/chat/${roomId}`, function(message) {
                const data = JSON.parse(message.body);
                displayMessage(data);
            });
            console.log('채팅방', roomId, '구독 시작');

            // 구독 직후 입장 시스템 메시지 전송
            // → 서버가 Redis pub/sub으로 구독자 전체에게 브로드캐스트
            stompClient.send('/pub/chat.enter', {}, JSON.stringify({ roomId: roomId, content: '' }));
        }
    }

    // ─────────────────────────────────────────────────────────
    // 메시지
    // ─────────────────────────────────────────────────────────
    async function loadPastMessages(roomId) {
        try {
            const response = await fetch(
                `${API_BASE}/api/chat/rooms/${roomId}/messages?size=50`,
                { headers: { Authorization: `Bearer ${jwtToken}` } }
            );
            if (!response.ok) return;

            const messages = await response.json();
            messages.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
            messages.forEach(msg => displayPastMessage(msg));

            const container = document.getElementById('chatMessages');
            container.scrollTop = container.scrollHeight;
        } catch (e) { console.error('과거 메시지 로드 실패:', e); }
    }

    function sendMessage(event) {
        event.preventDefault();
        const input   = document.getElementById('messageInput');
        const content = input.value.trim();
        if (!content || !currentRoomId) return;

        stompClient.send('/pub/chat.send', {}, JSON.stringify({
            roomId: currentRoomId,
            content: content
        }));
        input.value = '';
        if (typingTimeout) { clearTimeout(typingTimeout); typingTimeout = null; }
    }

    function displayMessage(data) {
        const container = document.getElementById('chatMessages');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        // 시스템 메시지 (입장 알림 등) — senderNickname === 'SYSTEM'
        if (data.senderNickname === 'SYSTEM') {
            const div = document.createElement('div');
            div.style.cssText = 'text-align:center; font-size:12px; color:var(--text-muted); padding:6px 0; font-style:italic;';
            div.textContent = data.content;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            return;
        }

        // senderNickname과 currentNickname으로 내 메시지 여부 판단
        const isMe = data.senderNickname === currentNickname;
        const time = new Date().toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' });

        const div = document.createElement('div');
        div.className = `message ${isMe ? 'me' : ''}`;
        div.innerHTML =
            (!isMe ? `<div class="message-sender">${escapeHtml(data.senderNickname ?? '')}</div>` : '') +
            `<div class="message-bubble">${escapeHtml(data.content)}</div>` +
            `<div class="message-time">${time}</div>`;
        container.appendChild(div);
        container.scrollTop = container.scrollHeight;
    }

    function displayPastMessage(data) {
        const container = document.getElementById('chatMessages');
        const emptyState = container.querySelector('.empty-state');
        if (emptyState) emptyState.remove();

        const isMe = data.senderNickname === currentNickname;
        const time = data.createdAt
            ? new Date(data.createdAt).toLocaleTimeString('ko-KR', { hour: '2-digit', minute: '2-digit' })
            : '';

        const div = document.createElement('div');
        div.className = `message ${isMe ? 'me' : ''}`;
        div.innerHTML =
            (!isMe ? `<div class="message-sender">${escapeHtml(data.senderNickname ?? '')}</div>` : '') +
            `<div class="message-bubble">${escapeHtml(data.content)}</div>` +
            `<div class="message-time">${time}</div>`;
        container.appendChild(div);
    }

    function clearMessages() {
        document.getElementById('chatMessages').innerHTML = `
            <div class="empty-state">
                <h3>📭 메시지가 없습니다</h3>
                <p>채팅방을 선택하고 메시지를 보내보세요!</p>
            </div>
        `;
    }

    // ─────────────────────────────────────────────────────────
    // 타이핑 인디케이터
    // ─────────────────────────────────────────────────────────
    function handleTyping() {
        if (typingTimeout) clearTimeout(typingTimeout);
        typingTimeout = setTimeout(() => {}, 2000);
    }

    function updateTypingIndicator() {
        const indicator = document.getElementById('typingIndicator');
        if (typingUsers.size === 0) {
            indicator.innerHTML = '';
        } else {
            const names = Array.from(typingUsers).join(', ');
            indicator.innerHTML = `${names}이 입력 중<span class="dots"></span>`;
        }
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }
</script>
</body>
</html>
